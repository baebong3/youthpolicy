name: daily-policy-radar

on:
  schedule:
    - cron: '0 23 * * *'      # UTC 23:00 = KST 08:00
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: policy-radar
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install requests feedparser python-dotenv anthropic

      - name: Collect central news
        env:
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_SECRET: ${{ secrets.NAVER_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python collect_news.py
        continue-on-error: true

      - name: Collect local news
        env:
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_SECRET: ${{ secrets.NAVER_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python collect_local_news.py
        continue-on-error: true

      - name: Commit refreshed data
        run: |
          git config user.name  "policy-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add daily_news.json news_archive.json local_news.json
          git diff --cached --quiet || git commit -m "chore: daily news $(date +%F)"
          git pull --no-rebase --no-edit -X ours origin ${{ github.ref_name }} || true
          git push
